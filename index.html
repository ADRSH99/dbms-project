<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IceWeave | Federated Query Engine</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --error: #f43f5e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.875rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
        }

        /* Editor Section */
        .workspace {
            display: grid;
            gap: 2rem;
            animation: fadeInUp 0.8s ease-out;
        }

        .card {
            background: var(--surface);
            border-radius: 1rem;
            border: 1px solid var(--border);
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent);
        }

        h2 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #020617;
            border: 1px solid var(--border);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            padding: 1rem;
            border-radius: 0.5rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 1rem;
        }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--accent-glow);
            filter: brightness(1.1);
        }

        /* Results Section */
        .results-container {
            margin-top: 1rem;
            overflow-x: auto;
            border-radius: 0.5rem;
            background: #020617;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th {
            background: var(--border);
            color: var(--text-muted);
            text-align: left;
            padding: 1rem;
            font-weight: 600;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .error-box {
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            display: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }

        /* Example Queries */
        .examples {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .example-chip {
            background: var(--border);
            padding: 0.35rem 0.75rem;
            border-radius: 99px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .example-chip:hover {
            background: var(--accent);
            color: var(--bg);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div>
                <h1>ICEWEAVE</h1>
                <p style="color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem;">Federated Query Engine
                    Dashboard</p>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                Engine Online
            </div>
        </header>

        <main class="workspace">
            <div class="card">
                <h2>SQL Query Editor</h2>
                <div class="examples">
                    <div class="example-chip" onclick="setQuery('SELECT * FROM users LIMIT 5')">Users (CSV)</div>
                    <div class="example-chip" onclick="setQuery('SELECT * FROM orders LIMIT 5')">Orders (Postgres)</div>
                    <div class="example-chip" onclick="setQuery('SELECT * FROM inventory LIMIT 5')">Inventory (Mongo)
                    </div>
                    <div class="example-chip"
                        onclick="setQuery('SELECT u.name, l.city, l.region FROM users u JOIN locations l ON u.city_id = l.id')">
                        User Locations (CSV + CSV)</div>
                    <div class="example-chip"
                        onclick="setQuery('SELECT u.name, o.product, o.amount FROM users u JOIN orders o ON u.id = o.user_id')">
                        User Orders (CSV + PG)</div>
                    <div class="example-chip"
                        onclick="setQuery('SELECT o.product, i.qty, r.rating, r.comment FROM orders o JOIN inventory i ON o.product = i.item JOIN reviews r ON o.id = r.product_id')">
                        Product Performance (PG + Mongo + PG)</div>
                    <div class="example-chip"
                        onclick="setQuery('SELECT u.name, p.name as product_name, c.name as cat, i.qty \nFROM users u \nJOIN orders o ON u.id = o.user_id \nJOIN products p ON o.product = p.name \nJOIN categories c ON p.category_id = c.id \nJOIN inventory i ON p.name = i.item')">
                        The "Full Shebang" (All Sources)</div>
                </div>
                <textarea id="sqlInput" placeholder="Enter your SQL query here...">SELECT u.name, o.product, i.qty 
FROM users u 
JOIN orders o ON u.id = o.user_id 
JOIN inventory i ON o.product = i.item</textarea>
                <div class="actions">
                    <button id="runBtn" onclick="executeQuery()">
                        <div class="loader" id="loader"></div>
                        <span>Run Query</span>
                    </button>
                </div>
            </div>

            <div class="card" id="resultsCard">
                <h2>Results</h2>
                <div id="errorBox" class="error-box"></div>
                <div class="results-container">
                    <table id="resultsTable">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                <div id="noData" style="display: block; padding: 2rem; text-align: center; color: var(--text-muted);">
                    Run a query to see the engine in action.
                </div>
            </div>
        </main>
    </div>

    <script>
        function setQuery(sql) {
            document.getElementById('sqlInput').value = sql;
        }

        async function executeQuery() {
            const sql = document.getElementById('sqlInput').value;
            const runBtn = document.getElementById('runBtn');
            const loader = document.getElementById('loader');
            const errorBox = document.getElementById('errorBox');
            const resultsTable = document.getElementById('resultsTable');
            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');
            const noData = document.getElementById('noData');

            // Reset UI
            errorBox.style.display = 'none';
            noData.style.display = 'none';
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';
            runBtn.disabled = true;
            loader.style.display = 'block';

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql })
                });

                const data = await response.json();

                if (data.error) {
                    errorBox.textContent = data.error;
                    errorBox.style.display = 'block';
                } else if (!data.columns || data.columns.length === 0) {
                    noData.textContent = "Query returned no results.";
                    noData.style.display = 'block';
                } else {
                    // Render Head
                    const trHead = document.createElement('tr');
                    data.columns.forEach(col => {
                        const th = document.createElement('th');
                        th.textContent = col;
                        trHead.appendChild(th);
                    });
                    tableHead.appendChild(trHead);

                    // Render Body
                    data.rows.forEach(row => {
                        const tr = document.createElement('tr');
                        row.forEach(cell => {
                            const td = document.createElement('td');
                            td.textContent = cell;
                            tr.appendChild(td);
                        });
                        tableBody.appendChild(tr);
                    });
                }
            } catch (err) {
                errorBox.textContent = "Fatal Engine Error: " + err.message;
                errorBox.style.display = 'block';
            } finally {
                runBtn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>
</body>

</html>
